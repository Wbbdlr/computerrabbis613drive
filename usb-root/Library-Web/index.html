<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline Library — Computer Rabbis</title>
<style>
  @font-face { font-family:"FrankRuehl"; src:url("fonts/FrankRuehlCLM-Medium.ttf"); font-display:swap; }
  @font-face { font-family:"NotoHe"; src:url("fonts/NotoSerifHebrew-VariableFont_wdth,wght.ttf"); font-display:swap; }
  :root {
    --navy:#232936; --navy2:#2f3747; --coral:#ee9f7e; --line:#e5e0d4;
    --bg:#faf7f0; --sidebar:#f3efe4; --card:#ffffff; --ink:#22252b; --muted:#6b7280; --readbg:#ffffff; --readink:#22252b;
  }
  body[data-theme="sepia"] { --bg:#f4ecd8; --sidebar:#efe6cf; --card:#faf3e2; --readbg:#f7efdc; --readink:#433422; --line:#ddd0b0; }
  body[data-theme="dark"] { --bg:#1c2028; --sidebar:#232936; --card:#262c37; --ink:#e6e6e6; --muted:#9aa3b2; --readbg:#20252e; --readink:#e2e2e2; --line:#3a414f; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { display:flex; flex-direction:column; background:var(--bg); color:var(--ink); font-family:Georgia,"Times New Roman",serif; }
  a { color:inherit; }
  header { background:var(--navy); color:#fff; padding:8px 14px; border-bottom:3px solid var(--coral); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header .home { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; }
  header img.logo { width:38px; height:38px; flex:none; }
  header .brand { color:var(--coral); text-transform:uppercase; letter-spacing:.1em; font-size:.8rem; line-height:1.1; }
  header .brand small { display:block; color:#cdd6ea; text-transform:none; letter-spacing:0; font-size:.9rem; }
  header .tools { margin-inline-start:auto; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .tbtn { background:var(--navy2); color:#eaeef6; border:1px solid #3a4353; border-radius:6px; padding:6px 10px; cursor:pointer; font:inherit; font-size:.85rem; }
  .tbtn:hover { background:#3a4353; }
  .tbtn.on { background:var(--coral); color:var(--navy); border-color:var(--coral); }
  header label.rng { font-size:.78rem; color:#cdd6ea; display:flex; gap:5px; align-items:center; }
  .layout { flex:1; display:flex; min-height:0; }
  .sidebar { width:340px; background:var(--sidebar); border-inline-end:1px solid var(--line); display:flex; flex-direction:column; transition:width .15s, margin .15s; }
  body.nosidebar .sidebar { width:0; margin-inline-start:-1px; overflow:hidden; }
  .searchbox { position:relative; padding:10px; border-bottom:1px solid var(--line); }
  .searchbox input { width:100%; padding:8px 10px; border:1px solid #c9c3b4; border-radius:7px; font:inherit; direction:rtl; background:var(--card); color:var(--ink); }
  #searchres { position:absolute; z-index:20; left:10px; right:10px; top:52px; background:var(--card); border:1px solid var(--line); border-radius:0 0 8px 8px; max-height:60vh; overflow:auto; box-shadow:0 6px 18px rgba(0,0,0,.15); display:none; }
  .sr-item { padding:8px 10px; border-bottom:1px solid var(--line); cursor:pointer; }
  .sr-item:hover { background:rgba(0,0,0,.05); }
  .sr-title { direction:rtl; font-family:"FrankRuehl",serif; font-size:1.05rem; }
  .sr-cat { direction:rtl; font-size:.72rem; color:var(--muted); }
  #tree { flex:1; overflow:auto; padding:6px 0; direction:rtl; }
  .cat-head { display:flex; align-items:center; gap:6px; cursor:pointer; padding:4px 8px; font-family:"FrankRuehl",serif; font-size:1.05rem; color:var(--ink); }
  .cat-head:hover { background:rgba(0,0,0,.05); }
  .caret { color:var(--coral); font-size:.8rem; width:12px; }
  .book-item { cursor:pointer; padding:3px 8px; direction:rtl; font-family:"FrankRuehl",serif; color:var(--ink); font-size:.98rem; }
  .book-item:hover { background:rgba(0,0,0,.05); }
  .book-item.active { background:var(--coral); color:var(--navy); }
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .findbar { padding:7px 12px; border-bottom:1px solid var(--line); background:var(--card); display:flex; gap:8px; align-items:center; position:relative; flex-wrap:wrap; }
  .findbar input#inbook { flex:0 1 260px; padding:6px 9px; border:1px solid #c9c3b4; border-radius:6px; font:inherit; direction:rtl; background:var(--card); color:var(--ink); }
  .fbtn { border:1px solid #c9c3b4; background:var(--card); color:var(--navy2); border-radius:6px; padding:6px 11px; cursor:pointer; font:inherit; font-size:.85rem; }
  .fbtn:hover { background:rgba(0,0,0,.05); }
  .fbtn.on { background:var(--navy); color:#fff; border-color:var(--navy); }
  #toc { display:none; position:absolute; z-index:40; top:44px; left:12px; width:min(420px,80vw); max-height:70vh; overflow:auto; background:var(--card); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.2); padding:6px 0; }
  .toc-item { padding:6px 14px; cursor:pointer; direction:rtl; font-family:"FrankRuehl",serif; border-bottom:1px solid var(--line); }
  .toc-item:hover { background:rgba(0,0,0,.05); }
  .toc-item.lvl2 { padding-inline-start:26px; font-size:.95em; }
  .toc-item.lvl3 { padding-inline-start:40px; font-size:.9em; color:var(--muted); }
  #langbar { display:flex; gap:2px; }
  #langbar button { border:1px solid #c9c3b4; background:var(--card); color:var(--navy2); padding:5px 12px; cursor:pointer; font:inherit; }
  #langbar button:first-child { border-radius:6px 0 0 6px; }
  #langbar button:last-child { border-radius:0 6px 6px 0; }
  #langbar button.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  #reader { flex:1; overflow:auto; padding:22px clamp(16px,6vw,90px); background:var(--readbg); color:var(--readink); }
  .crumb { direction:rtl; color:var(--muted); font-size:.8rem; margin-bottom:10px; font-family:"FrankRuehl",serif; }
  article.book, .bi-wrap { direction:rtl; font-family:"FrankRuehl","NotoHe",serif; line-height:1.9; max-width:820px; margin:0 auto; }
  article.book h1, .bi-wrap h1 { color:var(--navy); font-size:1.7em; text-align:center; border-bottom:2px solid var(--coral); padding-bottom:8px; }
  body[data-theme="dark"] article.book h1, body[data-theme="dark"] .bi-wrap h1 { color:var(--coral); }
  article.book h2 { color:var(--navy2); font-size:1.3em; margin-top:1.4em; }
  article.book h3 { color:var(--navy2); font-size:1.12em; }
  article.book p { margin:.5em 0; text-align:justify; }
  .tr-credit { text-align:center; color:var(--muted); font-size:.8rem; margin:6px 0 4px; font-style:italic; }
  .sec-label { color:var(--navy2); font-size:1.25em; text-align:center; margin:1.3em 0 .5em; direction:rtl; background:rgba(0,0,0,.05); border-radius:6px; padding:3px; }
  .seg-row { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  .seg-num { flex:none; width:2em; text-align:center; color:var(--coral); font-size:.8em; padding-top:.4em; font-family:Georgia,serif; }
  .seg-body { flex:1; min-width:0; }
  .he-seg { direction:rtl; font-family:"FrankRuehl","NotoHe",serif; line-height:1.9; }
  .en-seg { direction:ltr; font-family:Georgia,serif; line-height:1.6; color:var(--muted); margin-top:4px; }
  .lang-he .en-seg { display:none; }
  .lang-en .he-seg { display:none; }
  .lang-en .seg-body { text-align:left; }
  mark.f { background:var(--coral); color:var(--navy); }
  mark.hl { background:#ffe08a; color:inherit; cursor:pointer; border-radius:2px; }
  body[data-theme="dark"] mark.hl { background:#7a6a2a; color:#fff; }
  mark.hl.has-note { border-bottom:2px dotted #b58900; }
  /* home view */
  .home-wrap { max-width:760px; margin:6vh auto; }
  .home-wrap h2 { color:var(--navy); font-weight:normal; }
  body[data-theme="dark"] .home-wrap h2 { color:var(--coral); }
  .home-sec { margin:22px 0; }
  .home-sec h3 { color:var(--navy2); border-bottom:1px solid var(--line); padding-bottom:4px; }
  .chip-row { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:6px 14px; cursor:pointer; direction:rtl; font-family:"FrankRuehl",serif; }
  .chip:hover { border-color:var(--coral); }
  .muted { color:var(--muted); }
  .errbox { background:#7a1f1f; color:#fff; padding:14px 16px; border-radius:8px; margin:20px; }
  /* note popover */
  #note-pop { display:none; position:absolute; z-index:60; width:300px; background:var(--card); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.25); padding:10px; }
  #note-pop textarea { width:100%; height:80px; font:inherit; border:1px solid var(--line); border-radius:6px; padding:6px; background:var(--bg); color:var(--ink); }
  #note-pop .row { display:flex; gap:6px; justify-content:flex-end; margin-top:6px; }
  /* settings panel */
  #settings-panel { position:absolute; z-index:50; top:52px; right:12px; width:min(380px,90vw); background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 28px rgba(0,0,0,.22); padding:14px 18px; }
  .sp-section { margin:8px 0; }
  .sp-label { font-size:.82rem; color:var(--muted); margin-bottom:4px; }
  .sp-row { display:flex; gap:6px; align-items:center; }
  .sp-theme { flex:1; padding:8px; border:1px solid var(--line); border-radius:6px; background:var(--card); color:var(--ink); cursor:pointer; font:inherit; font-size:.85rem; }
  .sp-theme:hover { border-color:var(--coral); }
  .sp-theme.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  #settings-panel select { width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font:inherit; font-size:.9rem; background:var(--card); color:var(--ink); }
  #settings-panel label { font-size:.9rem; cursor:pointer; display:flex; align-items:center; gap:6px; }
  /* sidebar collapse arrow */
  #sidebar-arrow { position:absolute; left:340px; top:50%; transform:translateY(-50%); z-index:25; width:20px; height:52px; border:1px solid var(--line); border-radius:0 6px 6px 0; background:var(--sidebar); color:var(--muted); cursor:pointer; font-size:.7rem; padding:0; display:flex; align-items:center; justify-content:center; transition:left .15s; }
  #sidebar-arrow:hover { background:var(--coral); color:var(--navy); }
  body.nosidebar #sidebar-arrow { left:0; }
  body.nosidebar #sidebar-arrow::after { content:"\\276F"; }
  @media (max-width:760px){ .sidebar { width:78vw; position:absolute; z-index:30; height:100%; box-shadow:4px 0 16px rgba(0,0,0,.2);} #sidebar-arrow { display:none; } }
  @media print {
    header, .sidebar, .findbar { display:none !important; }
    #reader { overflow:visible; padding:0; }
    body, #reader { background:#fff; color:#000; }
    .en-seg { color:#000; }
  }
</style>
</head>
<body data-theme="light">
<header>
  <a class="home" href="https://computerrabbis.com" target="_blank" rel="noopener noreferrer" title="Visit Computer Rabbis (opens the website)">
    <img class="logo" src="../brand/computer-rabbis-logo.png" alt="Computer Rabbis">
    <span class="brand">Computer Rabbis<small>Offline Library · אוצר הספרים</small></span>
  </a>
  <div class="tools">
    <a class="tbtn" href="dictionaries.html" title="Jastrow, BDB, Klein dictionaries">Dictionaries</a>
    <a class="tbtn" href="../START-HERE.html" title="Back to the drive home page">Drive Home</a>
    <button class="tbtn" id="btn-sidebar" title="Show/hide the library list">Library</button>
    <button class="tbtn" id="btn-settings" title="Display, fonts, data">Settings</button>
    <button class="tbtn" id="btn-full" title="Fullscreen">Fullscreen</button>
    <span style="color:#cdd6ea;font-size:.78rem"><span id="count">...</span> seforim</span>
  </div>
</header>
<!-- Settings panel -->
<div id="settings-panel" style="display:none">
  <div class="sp-section">
    <div class="sp-label">Background</div>
    <div class="sp-row">
      <button class="sp-theme" data-theme="light">Light</button>
      <button class="sp-theme" data-theme="sepia">Sepia</button>
      <button class="sp-theme" data-theme="dark">Dark</button>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-label">Font</div>
    <select id="sp-font">
      <option value="frankruehl">Frank Ruehl (classic)</option>
      <option value="georgia">Georgia (serif)</option>
      <option value="arial">Arial (sans-serif)</option>
      <option value="times">Times New Roman</option>
      <option value="noto">Noto Serif Hebrew</option>
    </select>
  </div>
  <div class="sp-section">
    <div class="sp-label">Font size</div>
    <div class="sp-row">
      <span style="font-size:.85rem">A</span>
      <input type="range" id="fontsize" min="14" max="42" step="1" style="flex:1">
      <span style="font-size:1.3rem">A</span>
      <span id="sp-fontsize-val" class="muted" style="width:2.5em;text-align:center"></span>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-row">
      <label><input type="checkbox" id="nikud"> Show nikud (vowel marks)</label>
    </div>
  </div>
  <hr style="border:none;border-top:1px solid var(--line);margin:8px 0">
  <div class="sp-section">
    <div class="sp-label">Your data (notes, highlights, pins)</div>
    <div class="sp-row" style="gap:8px">
      <button class="fbtn" id="btn-export" title="Save your notes, highlights, and pins to a file">Export to file</button>
      <button class="fbtn" id="btn-import" title="Load previously exported data">Import from file</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
    <div class="muted" style="font-size:.78rem;margin-top:4px">Save your notes and highlights to this drive so they follow you between computers.</div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="searchbox">
      <input type="text" id="search" placeholder="חיפוש לפי שם ספר…  (search by title)">
      <div id="searchres"></div>
    </div>
    <div id="tree"><div class="muted" style="padding:12px">Loading library index…</div></div>
  </aside>
  <button id="sidebar-arrow" title="Toggle sidebar">&#x276E;</button>
  <div class="main">
    <div class="findbar">
      <button class="fbtn" id="btn-home" title="Home: pinned & recent seforim">Home</button>
      <button class="fbtn" id="toc-btn" style="display:none">Contents · תוכן</button>
      <div id="toc"></div>
      <input type="text" id="inbook" placeholder="חיפוש בתוך הספר…  (find in text)">
      <div id="langbar" style="display:none">
        <button data-lang="he">עברית</button>
        <button data-lang="both" class="active">Both</button>
        <button data-lang="en">English</button>
      </div>
      <button class="fbtn" id="btn-highlight" style="display:none" title="Highlight the selected text">Highlight</button>
      <button class="fbtn" id="btn-pin" style="display:none" title="Pin this sefer to your home page">Pin</button>
      <button class="fbtn" id="btn-print" style="display:none" title="Print this sefer">Print</button>
    </div>
    <div id="reader"></div>
    <div id="note-pop">
      <textarea id="note-text" placeholder="Note for this highlight…"></textarea>
      <div class="row">
        <button class="fbtn" id="note-del">Remove</button>
        <button class="fbtn" id="note-save">Save</button>
      </div>
    </div>
  </div>
</div>
<script src="reader.js"></script>
<script src="tree.js"></script>
<script src="tree-bilingual.js"></script>
</body>
</html>
